inputs:
  dagger:
    url: github:dagger/nix?ref=main
    inputs:
      nixpkgs:
        follows: nixpkgs
  deploy-rs:
    url: github:serokell/deploy-rs?ref=master
    inputs:
      nixpkgs:
        follows: nixpkgs
  devenv-zsh:
    url: github:teekennedy/devenv-zsh?ref=direnv-support
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  lab:
    url: path:cmd/lab
    inputs:
      nixpkgs:
        follows: nixpkgs
  mk-shell-bin:
    url: github:rrbutani/nix-mk-shell-bin
  nix2container:
    url: github:nlewo/nix2container
    inputs:
      nixpkgs:
        follows: nixpkgs
  nixpkgs:
    url: github:NixOS/nixpkgs/nixos-unstable
