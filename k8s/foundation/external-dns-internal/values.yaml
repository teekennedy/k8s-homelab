external-dns:
  fullnameOverride: external-dns-internal
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/kashalls/external-dns-unifi-webhook
        tag: v0.4.3
      env:
        - name: UNIFI_HOST
          value: "https://10.69.80.1"
        - name: UNIFI_API_KEY
          valueFrom:
            secretKeyRef:
              name: unifi-api-key
              key: api-key
        - name: UNIFI_SKIP_TLS_VERIFY
          value: "true"
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 5
        periodSeconds: 10
  txtOwnerId: homelab-internal
  sources:
    - service
    - ingress
    - gateway-httproute
    - traefik-proxy # Traefik IngressRoute CRDs
  annotationFilter: "traefik.ingress.kubernetes.io/router.entrypoints notin (websecurepublic)"
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Second instance: resolves websecurepublic resources to the public MetalLB
# VIP in internal (Unifi) DNS so they're reachable from the LAN.
external-dns-public:
  fullnameOverride: external-dns-public-internal
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/kashalls/external-dns-unifi-webhook
        tag: v0.4.3
      env:
        - name: UNIFI_HOST
          value: "https://10.69.80.1"
        - name: UNIFI_API_KEY
          valueFrom:
            secretKeyRef:
              name: unifi-api-key
              key: api-key
        - name: UNIFI_SKIP_TLS_VERIFY
          value: "true"
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 5
        periodSeconds: 10
  txtOwnerId: homelab-public-internal
  sources:
    - service
    - ingress
    - gateway-httproute
    - traefik-proxy
  annotationFilter: "traefik.ingress.kubernetes.io/router.entrypoints in (websecurepublic)"
  extraArgs:
    - --default-targets=10.69.80.120
    - --force-default-targets
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
