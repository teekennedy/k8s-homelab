---
# Traefik BasicAuth middleware for the Longhorn UI.
# Referenced by the Longhorn ingress via annotation:
#   traefik.ingress.kubernetes.io/router.middlewares: longhorn-system-longhorn-basic-auth@kubernetescrd
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: longhorn-basic-auth
  namespace: {{ .Release.Namespace }}
spec:
  basicAuth:
    secret: longhorn-basic-auth-htpasswd
