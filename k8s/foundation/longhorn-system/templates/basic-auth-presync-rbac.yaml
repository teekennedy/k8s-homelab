---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-basic-auth-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: longhorn-basic-auth-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
rules:
  # get and patch are resource-name scoped to the specific secret
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
    resourceNames: ["longhorn-basic-auth", "longhorn-basic-auth-htpasswd"]
  # create cannot be scoped by resourceName (resource doesn't exist yet)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: longhorn-basic-auth-setup
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
subjects:
  - kind: ServiceAccount
    name: longhorn-basic-auth-setup
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: longhorn-basic-auth-setup
  apiGroup: rbac.authorization.k8s.io
