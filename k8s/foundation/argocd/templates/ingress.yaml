apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: "{{ .Release.Namespace }}"
  annotations:
    # External-dns cannot autodetect the load balancer IP for a Traefik IngressRoute
    # Explicitly set an A record target.
    external-dns.alpha.kubernetes.io/target: 10.69.80.100
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.msng.to`)
      priority: 10
      services:
        - name: argocd-server
          port: 80
    - kind: Rule
      match: Host(`argocd.msng.to`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
