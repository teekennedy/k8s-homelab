external-dns:
  provider:
    name: cloudflare
  txtOwnerId: homelab
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: value
    - name: DEFAULT_TARGET
      valueFrom:
        configMapKeyRef:
          name: ddns-public-ip
          key: ip
  extraArgs:
    - "--default-targets=$(DEFAULT_TARGET)"
    - "--force-default-targets"
    - "--annotation-filter=traefik.ingress.kubernetes.io/router.entrypoints in (wspublic)"
  sources:
    - service
    - ingress
    - gateway-httproute
    - traefik-proxy # Traefik IngressRoute CRDs
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Internal instance: resolves non-wspublic resources to cluster IPs
# in Unifi DNS so internal clients avoid NAT reflection.
external-dns-internal:
  fullnameOverride: external-dns-internal
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/kashalls/external-dns-unifi-webhook
        tag: v0.4.3
      env:
        - name: UNIFI_HOST
          value: "https://10.69.80.1"
        - name: UNIFI_API_KEY
          valueFrom:
            secretKeyRef:
              name: unifi-api-key
              key: api-key
        - name: UNIFI_SKIP_TLS_VERIFY
          value: "true"
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 5
        periodSeconds: 10
  txtOwnerId: homelab-internal
  sources:
    - service
    - ingress
    - gateway-httproute
    - traefik-proxy
  annotationFilter: "traefik.ingress.kubernetes.io/router.entrypoints notin (wspublic)"
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Internal instance for public services: resolves wspublic resources
# to the public MetalLB VIP in Unifi DNS so they're reachable from the LAN.
external-dns-public-internal:
  fullnameOverride: external-dns-public-internal
  provider:
    name: webhook
    webhook:
      image:
        repository: ghcr.io/kashalls/external-dns-unifi-webhook
        tag: v0.4.3
      env:
        - name: UNIFI_HOST
          value: "https://10.69.80.1"
        - name: UNIFI_API_KEY
          valueFrom:
            secretKeyRef:
              name: unifi-api-key
              key: api-key
        - name: UNIFI_SKIP_TLS_VERIFY
          value: "true"
      livenessProbe:
        httpGet:
          path: /healthz
          port: http-webhook
        initialDelaySeconds: 10
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /readyz
          port: http-webhook
        initialDelaySeconds: 5
        periodSeconds: 10
  txtOwnerId: homelab-public-internal
  sources:
    - service
    - ingress
    - gateway-httproute
    - traefik-proxy
  annotationFilter: "traefik.ingress.kubernetes.io/router.entrypoints in (wspublic)"
  extraArgs:
    - --default-targets=10.69.80.120
    - --force-default-targets
  interval: 5m
  triggerLoopOnEvent: true
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

ddnsUpdater:
  enabled: true
  image:
    repository: alpine/curl
    tag: "8.17.0"
  period: "300" # seconds
  publicIpProvider: https://checkip.amazonaws.com
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
