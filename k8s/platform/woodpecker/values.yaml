# https://github.com/woodpecker-ci/helm/tree/main/charts/woodpecker
woodpecker:
  server:
    createAgentSecret: false
    env:
      WOODPECKER_HOST: "https://ci.msng.to"
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: "http://gitea-http.gitea:3000"
      WOODPECKER_EXPERT_FORGE_OAUTH_HOST: "https://git.msng.to"
      WOODPECKER_ADMIN: "tkennedy"
    extraSecretNamesForEnvFrom:
      - woodpecker-default-agent-secret
      - woodpecker-gitea-oauth2
    persistentVolume:
      storageClass: longhorn
    ingress:
      enabled: true
      hosts:
        - host: ci.msng.to
          paths:
            - path: /
              backend:
                serviceName: woodpecker-server
                servicePort: 80
      tls:
        - hosts:
            - ci.msng.to

  agent:
    replicaCount: 1
    extraVolumes:
      - name: nix-daemon-socket
        hostPath:
          path: /nix/var/nix/daemon-socket/socket
          type: Socket

    extraVolumeMounts:
      - name: nix-daemon-socket
        mountPath: /nix/var/nix/daemon-socket/socket

    env:
      WOODPECKER_SERVER: "woodpecker-server:9000"
      WOODPECKER_BACKEND: "kubernetes"
      WOODPECKER_BACKEND_K8S_NAMESPACE: "woodpecker"
      WOODPECKER_BACKEND_K8S_STORAGE_CLASS: "longhorn"
      WOODPECKER_BACKEND_K8S_VOLUME_SIZE: "1G"
