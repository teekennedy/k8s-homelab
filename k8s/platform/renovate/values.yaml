renovate:
  cronjob:
    schedule: '0 9 * * *'  # Everyday at 09:00
    ttlSecondsAfterFinished: 259200 # 3 days
    concurrencyPolicy: Forbid
    jobBackoffLimit: 1
  # pod-level securityContext
  securityContext:
    runAsUser: 12021
    # fsGroup: 1000 is added by default when persistent cache is enabled
    fsGroup: 1000
    fsGroupChangePolicy: "OnRootMismatch"
  renovate:
    config: |
      {
        "platform": "gitea",
        "endpoint": "https://git.msng.to/api/v1",
        "gitAuthor": "Renovate Bot <bot@renovateapp.com>",
        "autodiscover": true,
        "httpCacheTtlDays": 7
      }
    persistence:
      cache:
        # -- Allow the cache to persist between runs
        enabled: true
        # -- Storage class of the cache PVC (single replica is fine for cache)
        storageClass: longhorn-rc1
        # -- Storage size of the cache PVC
        storageSize: "20Gi"
        # -- Labels to set on the cache PVC
        labels:
          recurring-job.longhorn.io/source: "enabled"
          recurring-job-group.longhorn.io/ephemeral: "enabled"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi
  env:
    LOG_LEVEL: debug
  envList:
    # Use sqlite for cache instead of filesystem
    # https://docs.renovatebot.com/self-hosted-experimental/#renovate_x_sqlite_package_cache
    # https://github.com/renovatebot/renovate/discussions/30525
    - name: RENOVATE_X_SQLITE_PACKAGE_CACHE
      value: "true"
    - name: RENOVATE_GITHUB_COM_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-secret
          key: RENOVATE_GITHUB_COM_TOKEN
    - name: RENOVATE_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-gitea-user
          key: token
    # GPG commit signing key (bootstrapped by gpg-bootstrap-job)
    - name: RENOVATE_GIT_PRIVATE_KEY
      valueFrom:
        secretKeyRef:
          name: renovate-gpg-key
          key: GPG_PRIVATE_KEY
          optional: true
