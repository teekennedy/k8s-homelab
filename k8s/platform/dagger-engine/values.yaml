# https://github.com/dagger/dagger/blob/main/helm/dagger/values.yaml
dagger-helm:
  engine:
    # https://docs.dagger.io/reference/configuration/engine/
    # insecureRootCapabilities: effectively equivalent to running actions with `docker run --privileged`
    configJson: |
      {
        "security": {
          "insecureRootCapabilities": false
        }
      }
    kind: StatefulSet
    # use PVC instead of host path for data volume
    hostPath:
      dataVolume:
        enabled: false

    volumes:
      - name: nix-daemon-socket
        hostPath:
          path: /nix/var/nix/daemon-socket/socket
          type: Socket

    volumeMounts:
      - name: nix-daemon-socket
        mountPath: /nix/var/nix/daemon-socket/socket

    statefulSet:
      persistentVolumeClaim:
        enabled: true
        storageClassName: longhorn-rc1
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
